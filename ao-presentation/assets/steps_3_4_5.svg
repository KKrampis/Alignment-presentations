<svg xmlns="http://www.w3.org/2000/svg" width="900" viewBox="0 0 680 540" style="font-family: sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#444441" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .th { font-size: 14px; font-weight: 500; }
      .ts { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
      .c-gray rect   { fill: #F1EFE8; stroke: #B4B2A9; }
      .c-gray .th    { fill: #2C2C2A; }
      .c-gray .ts    { fill: #5F5E5A; }
      .c-teal rect   { fill: #E1F5EE; stroke: #5DCAA5; }
      .c-teal .th    { fill: #085041; }
      .c-purple rect { fill: #EEEDFE; stroke: #AFA9EC; }
      .c-purple .th  { fill: #26215C; }
      .c-purple .ts  { fill: #3C3489; }
    </style>
  </defs>

  <!-- Step 3 -->
  <rect x="30" y="4" width="620" height="118" rx="8" fill="none" stroke="#AFA9EC" stroke-width="1.5"/>
  <text x="46" y="24" style="font-size:12px;fill:#3C3489;font-weight:500;">Step 3</text>
  <text x="102" y="24" style="font-size:14px;font-weight:500;fill:#2C2C2A;">Package into OracleInput</text>
  <text x="46" y="46" style="font-size:12px;fill:#2C2C2A;font-family:monospace;">create_oracle_input(prompt, layer, n, tokenizer, acts_BD)</text>
  <text x="46" y="66" style="font-size:12px;fill:#5F5E5A;">— returns an </text>
  <text x="124" y="66" style="font-size:12px;fill:#2C2C2A;font-family:monospace;">OracleInput</text>
  <text x="212" y="66" style="font-size:12px;fill:#5F5E5A;"> dataclass with four fields:</text>
  <text x="60" y="86" style="font-size:12px;fill:#2C2C2A;font-family:monospace;">input_ids</text>
  <text x="144" y="86" style="font-size:12px;fill:#5F5E5A;"> — tokenised oracle prompt</text>
  <text x="60" y="106" style="font-size:12px;fill:#2C2C2A;font-family:monospace;">steering_vectors</text>
  <text x="248" y="106" style="font-size:12px;fill:#5F5E5A;"> — activations cloned to CPU, detached from graph</text>

  <line x1="340" y1="126" x2="340" y2="146" stroke="#444441" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Oracle dashed container -->
  <rect x="30" y="150" width="620" height="176" rx="10" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="5 3"/>
  <text x="46" y="168" class="ts">oracle — Qwen3-8B base + LoRA adapter="oracle", r=64 on attention and MLP projections</text>

  <!-- Layer 0 -->
  <g class="c-gray">
    <rect x="46" y="176" width="130" height="56" rx="8" stroke-width="0.5"/>
    <text x="111" y="196" text-anchor="middle" dominant-baseline="central" class="th" style="fill:#2C2C2A;">Layer 0</text>
    <text x="111" y="216" text-anchor="middle" dominant-baseline="central" class="ts">embed oracle prompt</text>
  </g>
  <line x1="176" y1="204" x2="200" y2="204" stroke="#444441" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Layer 1 steering hook -->
  <g class="c-purple">
    <rect x="204" y="172" width="250" height="120" rx="8" stroke-width="0.5"/>
    <text x="329" y="192" text-anchor="middle" dominant-baseline="central" class="th" style="fill:#26215C;">Layer 1 — steering hook</text>
    <text x="329" y="212" text-anchor="middle" dominant-baseline="central" style="font-size:12px;fill:#3C3489;font-family:monospace;">orig = resid[0, positions, :]</text>
    <text x="329" y="230" text-anchor="middle" dominant-baseline="central" style="font-size:12px;fill:#3C3489;font-family:monospace;">norms = orig.norm(dim=-1)</text>
    <text x="329" y="248" text-anchor="middle" dominant-baseline="central" style="font-size:12px;fill:#3C3489;font-family:monospace;">steered = normed_v * norms</text>
    <text x="329" y="266" text-anchor="middle" dominant-baseline="central" style="font-size:12px;fill:#3C3489;font-family:monospace;">resid[positions] += steered</text>
  </g>
  <line x1="454" y1="232" x2="476" y2="232" stroke="#444441" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Layers 2-35 -->
  <g class="c-gray">
    <rect x="480" y="176" width="154" height="72" rx="8" stroke-width="0.5"/>
    <text x="557" y="196" text-anchor="middle" dominant-baseline="central" class="th" style="fill:#2C2C2A;">Layers 2–35</text>
    <text x="557" y="216" text-anchor="middle" dominant-baseline="central" class="ts">process injected state</text>
    <text x="557" y="234" text-anchor="middle" dominant-baseline="central" class="ts">answer the question</text>
  </g>
  <line x1="557" y1="248" x2="557" y2="272" stroke="#444441" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Answer -->
  <g class="c-teal">
    <rect x="480" y="276" width="154" height="32" rx="6" stroke-width="0.5"/>
    <text x="557" y="292" text-anchor="middle" dominant-baseline="central" class="th" style="fill:#085041;">Answer generated</text>
  </g>

  <!-- Norm-matching formula explanation -->
  <rect x="30" y="352" width="620" height="150" rx="8" fill="none" stroke="#BA7517" stroke-width="1.5"/>
  <text x="46" y="372" style="font-size:12px;fill:#854F0B;font-weight:500;">Layer 1 formula</text>
  <text x="150" y="372" style="font-size:14px;font-weight:500;fill:#2C2C2A;">Norm-matching injection — Eq. 1</text>
  <text x="46" y="396" style="font-size:13px;fill:#2C2C2A;font-family:monospace;">h′ᵢ = hᵢ + ‖hᵢ‖ · (vᵢ / ‖vᵢ‖)</text>
  <text x="46" y="420" style="font-size:12px;fill:#5F5E5A;">vᵢ — target activation, reduced to a unit vector (direction only, magnitude discarded)</text>
  <text x="46" y="440" style="font-size:12px;fill:#5F5E5A;">hᵢ — oracle's own activation at that position; supplies the magnitude to rescale to</text>
  <text x="46" y="460" style="font-size:12px;fill:#5F5E5A;">rescaled vᵢ is added to hᵢ, never replaces it — replacement caused a norm blow-up</text>
  <text x="46" y="480" style="font-size:12px;fill:#5F5E5A;">20× at layer 0 · 100,000× at layer 1 — addition avoids this entirely</text>
</svg>
