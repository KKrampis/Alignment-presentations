<svg xmlns="http://www.w3.org/2000/svg" width="900" viewBox="0 0 680 400" style="font-family: sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#444441" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .th { font-size: 14px; font-weight: 500; fill: inherit; }
      .ts { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
      .c-gray rect  { fill: #F1EFE8; stroke: #B4B2A9; }
      .c-gray .th   { fill: #2C2C2A; }
      .c-teal rect  { fill: #E1F5EE; stroke: #5DCAA5; }
      .c-teal .th   { fill: #085041; }
      .c-teal .ts   { fill: #0F6E56; }
    </style>
  </defs>

  <!-- Target model container -->
  <rect x="30" y="10" width="620" height="130" rx="10" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="5 3"/>
  <text x="46" y="26" class="ts">target model — Qwen3-8B, adapter="default", normal forward pass, unaware of oracle</text>

  <!-- User prompt -->
  <g class="c-gray">
    <rect x="46" y="34" width="148" height="48" rx="8" stroke-width="0.5"/>
    <text x="120" y="52" text-anchor="middle" dominant-baseline="central" class="th">User prompt</text>
    <text x="120" y="70" text-anchor="middle" dominant-baseline="central" class="ts">"Capital of France?"</text>
  </g>
  <line x1="194" y1="58" x2="216" y2="58" stroke="#444441" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Forward pass -->
  <g class="c-gray">
    <rect x="220" y="34" width="190" height="48" rx="8" stroke-width="0.5"/>
    <text x="315" y="52" text-anchor="middle" dominant-baseline="central" class="th">Forward pass</text>
    <text x="315" y="70" text-anchor="middle" dominant-baseline="central" class="ts">layers 0–35, unchanged</text>
  </g>
  <line x1="410" y1="58" x2="432" y2="58" stroke="#444441" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Normal response -->
  <g class="c-gray">
    <rect x="436" y="34" width="198" height="48" rx="8" stroke-width="0.5"/>
    <text x="535" y="52" text-anchor="middle" dominant-baseline="central" class="th">Normal response</text>
    <text x="535" y="70" text-anchor="middle" dominant-baseline="central" class="ts">target unaware of oracle</text>
  </g>

  <!-- Hook arrow down -->
  <line x1="315" y1="82" x2="315" y2="106" stroke="#444441" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="330" y="100" class="ts">hook fires at layer 18 of 36 (50% depth)</text>

  <!-- Activation tensor -->
  <g class="c-teal">
    <rect x="46" y="110" width="504" height="26" rx="6" stroke-width="0.5"/>
    <text x="298" y="123" text-anchor="middle" dominant-baseline="central" class="ts">activation tensor captured — shape [seq_len × 4096], one 4096-dim vector per token</text>
  </g>

  <!-- Arrow to step 1 -->
  <line x1="298" y1="140" x2="298" y2="160" stroke="#444441" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Step 1 box -->
  <rect x="30" y="164" width="620" height="96" rx="8" fill="none" stroke="#5DCAA5" stroke-width="1.5"/>
  <text x="46" y="182" style="font-size:12px;fill:#085041;font-weight:500;">Step 1</text>
  <text x="102" y="182" style="font-size:14px;font-weight:500;fill:#2C2C2A;" text-anchor="start">Collect activations</text>
  <text x="46" y="202" style="font-size:12px;fill:#2C2C2A;font-family:monospace;" text-anchor="start">collect_activations_multiple_layers(model, submodules, inputs_BL)</text>
  <text x="46" y="222" style="font-size:12px;fill:#5F5E5A;" text-anchor="start">— registers forward hook on </text>
  <text x="224" y="222" style="font-size:12px;fill:#2C2C2A;font-family:monospace;" text-anchor="start">model.model.layers[18]</text>
  <text x="46" y="242" style="font-size:12px;fill:#5F5E5A;" text-anchor="start">— hook stores </text>
  <text x="130" y="242" style="font-size:12px;fill:#2C2C2A;font-family:monospace;" text-anchor="start">outputs[0]</text>
  <text x="210" y="242" style="font-size:12px;fill:#5F5E5A;" text-anchor="start"> into a dict, then raises </text>
  <text x="380" y="242" style="font-size:12px;fill:#2C2C2A;font-family:monospace;" text-anchor="start">EarlyStopException</text>
  <text x="530" y="242" style="font-size:12px;fill:#5F5E5A;" text-anchor="start"> to stop early</text>

  <!-- Arrow to step 2 -->
  <line x1="298" y1="264" x2="298" y2="284" stroke="#444441" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Step 2 box -->
  <rect x="30" y="288" width="620" height="100" rx="8" fill="none" stroke="#EF9F27" stroke-width="1.5"/>
  <text x="46" y="306" style="font-size:12px;fill:#633806;font-weight:500;">Step 2</text>
  <text x="102" y="306" style="font-size:14px;font-weight:500;fill:#2C2C2A;" text-anchor="start">Build oracle prompt + find ? positions</text>
  <text x="46" y="326" style="font-size:12px;fill:#2C2C2A;font-family:monospace;" text-anchor="start">get_introspection_prefix(layer=18, num_positions=5)</text>
  <text x="46" y="344" style="font-size:12px;fill:#5F5E5A;" text-anchor="start">— returns </text>
  <text x="104" y="344" style="font-size:12px;fill:#2C2C2A;font-family:monospace;" text-anchor="start">"Layer: 18\n ? ? ? ? ? \n"</text>
  <text x="300" y="344" style="font-size:12px;fill:#5F5E5A;" text-anchor="start"> prepended to the user question</text>
  <text x="46" y="362" style="font-size:12px;fill:#2C2C2A;font-family:monospace;" text-anchor="start">find_pattern_in_tokens(token_ids, " ?", n, tokenizer)</text>
  <text x="46" y="378" style="font-size:12px;fill:#5F5E5A;" text-anchor="start">— scans tokenised prompt for all </text>
  <text x="230" y="378" style="font-size:12px;fill:#2C2C2A;font-family:monospace;" text-anchor="start">" ?"</text>
  <text x="260" y="378" style="font-size:12px;fill:#5F5E5A;" text-anchor="start"> IDs, verifies count = n and consecutive, returns positions</text>
</svg>
