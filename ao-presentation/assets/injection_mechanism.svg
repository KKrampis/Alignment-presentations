<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Two parallel pipelines: the target model produces and saves activation vectors, while the oracle processes a prompt containing placeholder tokens. At layer 1 of the oracle, a hook overwrites only the placeholder positions with the saved activations, then generation continues normally.</desc>
